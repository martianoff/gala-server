name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  GALA_VERSION: "0.61.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install GALA CLI
        run: |
          curl -fsSL -o /usr/local/bin/gala \
            "https://github.com/martianoff/gala/releases/download/${GALA_VERSION}/gala-linux-amd64"
          chmod +x /usr/local/bin/gala
          gala version

      - name: Build
        run: gala build

      - name: Test
        run: gala test
