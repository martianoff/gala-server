name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  GALA_VERSION: "0.24.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install GALA CLI
        run: |
          curl -fsSL -o /usr/local/bin/gala \
            "https://github.com/martianoff/gala/releases/download/${GALA_VERSION}/gala-linux-amd64"
          chmod +x /usr/local/bin/gala
          gala version

      - name: Clone GALA toolchain
        run: |
          git clone --depth 1 --branch ${GALA_VERSION} \
            https://github.com/martianoff/gala.git ../gala_simple

      - name: Regenerate go.mod
        run: gala mod tidy

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build
        run: |
          GOROOT_PATH=$(go env GOROOT)
          bazel build //... --repo_env=GOROOT="$GOROOT_PATH" --action_env=GOROOT="$GOROOT_PATH" --action_env=PATH

      - name: Test
        run: |
          GOROOT_PATH=$(go env GOROOT)
          bazel test //... --test_output=errors --repo_env=GOROOT="$GOROOT_PATH" --action_env=GOROOT="$GOROOT_PATH" --action_env=PATH
