name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GALA
        run: |
          curl -fsSL https://gala-lang.dev/install.sh | bash
          echo "$HOME/.gala/bin" >> $GITHUB_PATH

      - name: Regenerate go.mod for this environment
        run: gala mod tidy

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build
        run: bazel build //...

      - name: Test
        run: bazel test //... --test_output=errors
